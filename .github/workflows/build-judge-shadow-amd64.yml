name: build-judge-shadow-amd64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build linux-amd64 judge image archive
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile.legacy \
            -t xmuoj/judge-server:shadow \
            --output=type=docker,dest=judge-server-linux-amd64.tar \
            .
          gzip -f judge-server-linux-amd64.tar

      - name: Upload judge image artifact
        uses: actions/upload-artifact@v4
        with:
          name: judge-server-linux-amd64
          path: judge-server-linux-amd64.tar.gz
          if-no-files-found: error
          retention-days: 7